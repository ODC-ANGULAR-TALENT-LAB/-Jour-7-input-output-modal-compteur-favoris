<div class="products-grid">
  @for (product of products(); track product.id) {
    <app-productitem
      [product]="product"
      (displayProductViewModal)="onDisplayProductViewModal($event)"
      (rate)="onRate(product, $event)"
    />
  }
</div>

@if (isDisplayModal() && modalProduct(); as selectedProduct) {
  <app-modalproductview
    [product]="selectedProduct"
    [isFavorite]="isModalProductFavorite()"
    (close)="onCloseModal()"
    (favoriteAdded)="onFavoriteAdded($event)"
    (favoriteRemoved)="onFavoriteRemoved($event)"
    (rate)="onRate(selectedProduct, $event)"
  />
}
